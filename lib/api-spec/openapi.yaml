openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: repo
    description: Repository analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /repo/analyze:
    post:
      operationId: analyzeRepo
      tags: [repo]
      summary: Analyze a GitHub repository
      description: Fetches all files from a GitHub repo and generates AI explanations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRepoRequest"
      responses:
        "200":
          description: Analysis started - streams SSE events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRepoRequest:
      type: object
      properties:
        repoUrl:
          type: string
          description: GitHub repository URL (e.g. https://github.com/owner/repo)
      required:
        - repoUrl
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
